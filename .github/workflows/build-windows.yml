name: OpenSheet Windows x64 Installer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
    # ── Checkout ───────────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ── Qt 6.6 ────────────────────────────────────────────────────────────────
    - name: Install Qt 6.6
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: windows
        target: desktop
        arch: win64_msvc2019_64
        modules: 'qtcharts qtsql'
        cache: true
        cache-key-prefix: qt-6.6.3-msvc2019-64

    # ── MSVC ──────────────────────────────────────────────────────────────────
    - name: Set up MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # ── CMake configure ───────────────────────────────────────────────────────
    - name: Configure CMake (Release)
      run: |
        cmake -B build `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    # ── Build ─────────────────────────────────────────────────────────────────
    - name: Build OpenSheet
      run: cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS

    # ── Deploy Qt runtime ─────────────────────────────────────────────────────
    - name: Deploy Qt runtime DLLs
      shell: cmd
      run: |
        mkdir deploy
        copy build\bin\OpenSheet.exe deploy\
        for %%f in (build\bin\*.dll) do copy "%%f" deploy\
        windeployqt --release --no-translations --no-opengl-sw `
          --no-system-d3d-compiler deploy\OpenSheet.exe

    # ── Inno Setup installer ──────────────────────────────────────────────────
    - name: Install Inno Setup 6
      run: choco install innosetup --no-progress -y

    - name: Build installer with Inno Setup
      shell: cmd
      run: |
        iscc /O. /Fdeploy\OpenSheet-Setup installer\OpenSheet.iss

    # ── Upload artifacts ──────────────────────────────────────────────────────
    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenSheet-Windows-x64-Installer
        path: OpenSheet-Setup.exe
        retention-days: 30

    - name: Upload portable build
      uses: actions/upload-artifact@v4
      with:
        name: OpenSheet-Windows-x64-Portable
        path: deploy/
        retention-days: 14

  # ── Release (on tag) ──────────────────────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: OpenSheet-Windows-x64-Installer
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: OpenSheet-Setup.exe
        generate_release_notes: true
