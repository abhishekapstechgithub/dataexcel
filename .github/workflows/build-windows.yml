name: Windows Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt 6.5.3
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        host: windows
        target: desktop
        arch: win64_msvc2019_64
        cache: true

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure
      run: |
        cmake -B build `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" `
          -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE="${{ github.workspace }}\build\bin"

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Show build output (debug)
      shell: cmd
      run: |
        echo === build\bin contents ===
        dir build\bin /s /b 2>nul || echo "(empty)"
        echo === build\bin\Release contents ===
        dir build\bin\Release /s /b 2>nul || echo "(empty)"

    - name: Deploy Qt DLLs
      shell: cmd
      run: |
        mkdir deploy

        :: MSVC puts outputs in build\bin\Release\ — copy exe and all DLLs from there
        if exist "build\bin\Release\QtSpreadsheet.exe" (
          copy "build\bin\Release\QtSpreadsheet.exe" deploy\
          for %%f in (build\bin\Release\*.dll) do copy "%%f" deploy\
        ) else if exist "build\bin\QtSpreadsheet.exe" (
          copy "build\bin\QtSpreadsheet.exe" deploy\
          for %%f in (build\bin\*.dll) do copy "%%f" deploy\
        ) else (
          echo ERROR: Cannot find QtSpreadsheet.exe
          dir build /s /b
          exit /b 1
        )

        :: Run windeployqt to pull in all Qt DLLs + plugins
        windeployqt --release --no-translations --no-system-d3d-compiler "deploy\QtSpreadsheet.exe"

    - name: Install NSIS
      run: choco install nsis --no-progress -y

    - name: Build installer
      shell: cmd
      run: |
        copy installer\QtSpreadsheet.nsi deploy\QtSpreadsheet.nsi
        cd deploy
        makensis QtSpreadsheet.nsi
        if errorlevel 1 exit /b 1
        echo === Installer built ===
        dir QtSpreadsheet-Setup.exe

    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: QtSpreadsheet-Windows-Installer
        path: deploy\QtSpreadsheet-Setup.exe
        retention-days: 30
